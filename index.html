<!DOCTYPE html>
<html>
<head>
    <title>Kutus Boda App | Trusted Ride</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #00ffa3; --dark-card: #0a0f1d; --bg: #05070a; --red: #ff4757; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        
        /* LOGIN/SIGNUP STYLING */
        .auth-container { background: var(--dark-card); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; border: 1px solid var(--neon); text-align: center; color: white; box-shadow: 0 0 20px rgba(0,255,163,0.1); }
        .tab-box { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; background: transparent; color: white; }
        .tab-btn.active-tab { background: var(--neon); color: var(--dark-card); }
        
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--neon); }

        .btn-main { width: 100%; padding: 18px; background: var(--neon); color: var(--dark-card); border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; }
        .btn-outline { width: 100%; padding: 15px; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* PORTAL STYLING */
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: white; border-bottom: 4px solid var(--neon); position: fixed; top: 0; z-index: 1000; box-sizing: border-box; }
        .btn-loc { background: white; border: 2px solid var(--neon); padding: 18px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; width: 100%; }
        .rider-card { background: white; padding: 15px; border-radius: 20px; border: 2px solid #e2e8f0; text-align: center; cursor: pointer; }
        .selected-rider { border-color: var(--neon); background: #f0fffb; transform: scale(1.02); }

        /* PAYMENT MODAL */
        #payment-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="auth-scr" class="screen active" style="justify-content: center; background: var(--bg);">
        <div class="auth-container">
            <h1 style="font-family:Orbitron; color:var(--neon); margin:0;">KUTUS BODA APP</h1>
            <p style="font-size: 11px; letter-spacing: 3px; margin-bottom: 25px; color: var(--neon);">TRUSTED RIDE</p>
            
            <div class="tab-box">
                <button id="tab-st" class="tab-btn active-tab" onclick="setRole('student')">STUDENT</button>
                <button id="tab-rd" class="tab-btn" onclick="setRole('rider')">RIDER</button>
            </div>

            <input id="auth-name" placeholder="Full Name">
            <input id="auth-pass" type="password" placeholder="Password">
            <div id="rider-fields" style="display:none;">
                <input id="auth-plate" placeholder="Motorbike Plate (KMG...)">
            </div>

            <button class="btn-main" onclick="enterPortal()">SIGN IN</button>
            <button class="btn-outline" onclick="alert('Account creation logic linked to OODA Database')">SIGN UP</button>
        </div>
    </div>

    <div id="student-portal" class="screen" style="padding-top: 100px;">
        <div class="header">
            <div style="font-family:Orbitron; font-weight:bold;">TRUSTED RIDE</div>
            <div style="color:var(--red); cursor:pointer; font-weight:bold;" onclick="logout()">LOGOUT</div>
        </div>

        <div style="width:100%; max-width:500px;">
            <h3>1. Select your Rider</h3>
            <div id="rider-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div class="rider-card" onclick="pickRider('KMGX654J', this)">
                    <span style="font-size:30px">🏍️</span><br><b>Emmaya</b><br><small>KMGX654J</small>
                </div>
                <div class="rider-card" onclick="pickRider('KMGH421X', this)">
                    <span style="font-size:30px">🏍️</span><br><b>DCSC</b><br><small>KMGH421X</small>
                </div>
            </div>

            <h3>2. Destination</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
                <button class="btn-loc" onclick="openPayment('SPENZA')">SPENZA</button>
                <button class="btn-loc" onclick="openPayment('SCHOOL')">SCHOOL</button>
                <button class="btn-loc" onclick="openPayment('RAHA')">RAHA</button>
                <button class="btn-loc" onclick="openPayment('NGOMONGO')">NGOMONGO</button>
                <button class="btn-loc" onclick="openPayment('ICON')" style="grid-column: span 2; border-width: 4px;">ICON</button>
            </div>
        </div>
    </div>

    <div id="rider-portal" class="screen" style="padding-top: 100px;">
        <div class="header">
            <div style="font-family:Orbitron; font-weight:bold;">RIDER CONSOLE</div>
            <div style="color:var(--red); cursor:pointer; font-weight:bold;" onclick="logout()">LOGOUT</div>
        </div>
        <div class="auth-container" style="background:white; color:black;">
            <h2 id="r-name">Hi Rider</h2>
            <button class="btn-main" onclick="this.innerText='ONLINE'; this.style.background='#00ffa3'">GO ONLINE</button>
        </div>
    </div>

    <div id="payment-modal">
        <div class="auth-container" style="max-width:340px;">
            <h2 style="font-family:Orbitron; color:var(--neon);">MPESA PAY</h2>
            <p style="font-size:12px;">Payment for trip to <span id="pay-dest" style="color:var(--neon)"></span></p>
            
            <input id="mpesa-num" type="number" placeholder="2547XXXXXXXX" style="text-align:center; font-size:18px; letter-spacing:1px; border: 2px solid var(--neon);">
            
            <button class="btn-main" onclick="processSTK()">CONFIRM & PAY</button>
            <p onclick="document.getElementById('payment-modal').style.display='none'" style="margin-top:15px; cursor:pointer; font-size:12px;">Cancel</p>
        </div>
    </div>

    <script>
        let role = 'student';
        let riderSelected = null;
        let destSelected = '';

        function setRole(r) {
            role = r;
            document.getElementById('tab-st').className = r === 'student' ? 'tab-btn active-tab' : 'tab-btn';
            document.getElementById('tab-rd').className = r === 'rider' ? 'tab-btn active-tab' : 'tab-btn';
            document.getElementById('rider-fields').style.display = r === 'rider' ? 'block' : 'none';
        }

        function enterPortal() {
            const name = document.getElementById('auth-name').value;
            if(!name) return alert("Enter Name");
            document.getElementById('auth-scr').classList.remove('active');
            if(role === 'student') document.getElementById('student-portal').classList.add('active');
            else {
                document.getElementById('rider-portal').classList.add('active');
                document.getElementById('r-name').innerText = "Hi, " + name;
            }
        }

        function logout() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('auth-scr').classList.add('active');
        }

        function pickRider(plate, el) {
            riderSelected = plate;
            document.querySelectorAll('.rider-card').forEach(c => c.classList.remove('selected-rider'));
            el.classList.add('selected-rider');
        }

        function openPayment(dest) {
            if(!riderSelected) return alert("Error: You must pick a rider first!");
            destSelected = dest;
            document.getElementById('pay-dest').innerText = dest;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        async function processSTK() {
            const num = document.getElementById('mpesa-num').value;
            if(!num || num.length < 10) return alert("Enter valid number starting with 254...");
            
            // Logic to link with your Python OODA Project
            try {
                const res = await fetch('http://127.0.0.1:10000/stk', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ phone: num, destination: destSelected, plate: riderSelected })
                });
                const data = await res.json();
                if(data.CheckoutRequestID) alert("STK PUSH SENT! Enter your PIN on your phone screen.");
                else alert("M-Pesa Error: " + data.errorMessage);
            } catch (e) {
                alert("Connection Failed: Ensure your Python backend is running for your OODA project!");
            }
            document.getElementById('payment-modal').style.display='none';
        }
    </script>
</body>
</html>
