<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kutus Boda App | Trusted Ride</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #00ffa3; --dark-card: #0a0f1d; --bg: #05070a; --red: #ff4757; --gray: #64748b; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-container { background: var(--dark-card); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; border: 2px solid var(--neon); text-align: center; color: white; box-shadow: 0 0 30px rgba(0, 255, 163, 0.2); }
        .tab-box { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; background: transparent; color: white; transition: 0.3s; }
        .tab-btn.active-tab { background: var(--neon); color: var(--dark-card); }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; background: var(--neon); color: var(--dark-card); border: none; border-radius: 16px; font-weight: 800; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: white; border-bottom: 4px solid var(--neon); position: fixed; top: 0; left: 0; box-sizing: border-box; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .rider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .rider-card { background: white; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0; text-align: center; cursor: pointer; transition: all 0.3s; }
        .rider-card.selected-rider { border-color: var(--neon); background: #f0fffb; transform: translateY(-5px); }
        .btn-loc { background: white; border: 2px solid var(--neon); padding: 18px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.2s; }
        #payment-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding: 20px; }
        .request-item { background: #fff; border-left: 10px solid var(--red); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="auth-scr" class="screen active" style="justify-content: center; background: var(--bg);">
        <div class="auth-container">
            <h1 style="font-family:Orbitron; color:var(--neon); margin:0;">KUTUS BODA</h1>
            <div class="tab-box">
                <button id="tab-st" class="tab-btn active-tab" onclick="setRole('student')">STUDENT</button>
                <button id="tab-rd" class="tab-btn" onclick="setRole('rider')">RIDER</button>
            </div>
            <input id="auth-name" placeholder="Full Name">
            <div id="rider-fields" style="display:none;">
                <input id="auth-plate" placeholder="Plate (e.g. KMGX654J)">
                <input id="auth-id" placeholder="National ID Number" type="number">
            </div>
            <input id="auth-pass" type="password" placeholder="Password">
            <button class="btn-main" onclick="enterPortal()">SIGN IN</button>
        </div>
    </div>

    <div id="student-portal" class="screen" style="padding-top: 100px;">
        <div class="header">
            <div style="font-family:Orbitron; font-weight:bold;">STUDENT PORTAL</div>
            <div style="color:var(--red); cursor:pointer; font-weight:bold;" onclick="logout()">LOGOUT</div>
        </div>
        <div style="width:100%; max-width:500px;">
            <p id="loc-status" style="font-size: 12px; color: var(--gray); text-align: center;">Locating GPS...</p>
            <h3>1. Choose your Rider</h3>
            <div id="rider-grid" class="rider-grid"></div>

            <h3 style="margin:25px 0 10px 0;">2. Choose Destination</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn-loc" onclick="openPayment('SPENZA')">SPENZA</button>
                <button class="btn-loc" onclick="openPayment('SCHOOL')">SCHOOL</button>
                <button class="btn-loc" onclick="openPayment('RAHA')">RAHA</button>
                <button class="btn-loc" onclick="openPayment('MJINI')">MJINI</button>
                <button class="btn-loc" onclick="openPayment('SOKO')">SOKO</button>
                <button class="btn-loc" onclick="openPayment('NGOMONGO')">NGOMONGO</button>
                <button class="btn-loc" onclick="openPayment('ICON')" style="grid-column: span 2;">ICON</button>
            </div>
        </div>
    </div>

    <div id="rider-portal" class="screen" style="padding-top: 100px;">
        <div class="header">
            <div style="font-family:Orbitron; font-weight:bold;">RIDER PORTAL</div>
            <div style="color:var(--red); cursor:pointer; font-weight:bold;" onclick="logout()">LOGOUT</div>
        </div>
        <div class="auth-container" style="background:white; color:black; width: 95%; max-width: 500px;">
            <h2 id="r-name" style="margin:5px 0;">Rider Name</h2>
            <p id="r-details-display" style="color:var(--gray); margin-bottom:20px;"></p>
            <hr>
            <div id="requests-container">
                <p style="color:var(--gray);">Waiting for requests...</p>
            </div>
        </div>
    </div>

    <div id="payment-modal">
        <div class="auth-container" style="max-width:340px;">
            <h2 style="font-family:Orbitron; color:var(--neon);">MPESA PAY</h2>
            <p>Confirm booking to <span id="pay-dest" style="color:var(--neon); font-weight:bold;"></span></p>
            <input id="mpesa-num" type="number" placeholder="Enter M-Pesa Number" style="text-align:center;">
            <button class="btn-main" onclick="processSTK()">PAY & REQUEST</button>
            <button style="background:none; border:none; color:var(--red); font-weight:bold; cursor:pointer; margin-top:10px;" onclick="closePay()">CANCEL</button>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:10000";
        let role = 'student', riderSelected = null, studentLat = 0, studentLon = 0;
        let currentRiderPlate = "", riderName = "";

        function setRole(r) {
            role = r;
            document.getElementById('tab-st').className = r === 'student' ? 'tab-btn active-tab' : 'tab-btn';
            document.getElementById('tab-rd').className = r === 'rider' ? 'tab-btn active-tab' : 'tab-btn';
            document.getElementById('rider-fields').style.display = r === 'rider' ? 'block' : 'none';
        }

        async function enterPortal() {
            riderName = document.getElementById('auth-name').value;
            if(!riderName) return alert("Enter Name");
            
            if(role === 'student') {
                document.getElementById('auth-scr').classList.remove('active');
                document.getElementById('student-portal').classList.add('active');
                getLocation();
            } else {
                currentRiderPlate = document.getElementById('auth-plate').value.toUpperCase();
                const riderID = document.getElementById('auth-id').value;
                if(!currentRiderPlate || !riderID) return alert("Enter Plate and ID Number");
                
                const res = await fetch(`${API_URL}/update_status`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        plate: currentRiderPlate, 
                        status: 'available', 
                        name: riderName,
                        id_number: riderID 
                    })
                });
                
                if(res.ok) {
                    document.getElementById('auth-scr').classList.remove('active');
                    document.getElementById('rider-portal').classList.add('active');
                    document.getElementById('r-name').innerText = riderName;
                    document.getElementById('r-details-display').innerHTML = `Plate: ${currentRiderPlate} | ID: ${riderID}`;
                }
            }
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    studentLat = pos.coords.latitude;
                    studentLon = pos.coords.longitude;
                    document.getElementById('loc-status').innerText = "GPS Connected ✅";
                }, () => { alert("Please enable GPS"); });
            }
        }

        function openPayment(dest) {
            if(!riderSelected) return alert("Pick a rider first!");
            document.getElementById('pay-dest').innerText = dest;
            document.getElementById('payment-modal').style.display = 'flex';
        }

        function closePay() { document.getElementById('payment-modal').style.display = 'none'; }

        async function processSTK() {
            const num = document.getElementById('mpesa-num').value;
            const dest = document.getElementById('pay-dest').innerText;
            const sName = document.getElementById('auth-name').value; // Student's name

            if(!num) return alert("Enter M-Pesa Number");

            try {
                const res = await fetch(`${API_URL}/send_request`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        phone: num, 
                        student_name: sName,
                        rider_plate: riderSelected, 
                        destination: dest,
                        lat: studentLat, 
                        lon: studentLon
                    })
                });
                const data = await res.json();
                if(data.status === "success") {
                    alert(`Request Sent! Fare: Ksh ${data.fare}. Check phone for PIN.`);
                    closePay();
                }
            } catch (e) { alert("Server Error"); }
        }

        async function syncRiderAvailability() {
            if(role !== 'student') return;
            try {
                const res = await fetch(`${API_URL}/get_riders`);
                const riders = await res.json();
                const grid = document.getElementById('rider-grid');
                grid.innerHTML = '';
                riders.forEach(r => {
                    const card = document.createElement('div');
                    card.className = `rider-card ${riderSelected === r.plate ? 'selected-rider' : ''}`;
                    card.onclick = () => { riderSelected = r.plate; syncRiderAvailability(); };
                    card.innerHTML = `<b>${r.name}</b><br><small>${r.plate}</small><br>
                                    <span style="color:green">● ONLINE</span>`;
                    grid.appendChild(card);
                });
            } catch(e){}
        }

        async function checkRequests() {
            if(role !== 'rider' || !currentRiderPlate) return;
            try {
                const res = await fetch(`${API_URL}/get_requests`);
                const data = await res.json();
                const container = document.getElementById('requests-container');
                
                if(data.length > 0) {
                    container.innerHTML = '<h4 style="color:var(--red);">LIVE REQUESTS</h4>';
                    // Show newest at top
                    data.slice().reverse().forEach(req => {
                        const item = document.createElement('div');
                        item.className = "request-item";
                        
                        // Check if this specific rider was the one clicked
                        const isForMe = req.target_rider_plate === currentRiderPlate 
                            ? `<span style="background:var(--neon); color:black; padding:3px 8px; border-radius:5px; font-weight:bold; font-size:12px;">DIRECT REQUEST FOR YOU</span>`
                            : `<span style="color:var(--gray); font-size:12px;">For: ${req.targeted_rider_name}</span>`;

                        item.innerHTML = `
                            <div style="margin-bottom:10px;">${isForMe}</div>
                            <p style="margin:5px 0;"><b>STUDENT:</b> ${req.student_name}</p>
                            <p style="margin:5px 0;"><b>TO:</b> ${req.destination} (${req.distance} KM)</p>
                            <p style="margin:5px 0; color:green; font-weight:bold;"><b>FARE:</b> KSH ${req.fare}</p>
                            <a href="${req.map_url}" target="_blank" style="display:block; background:var(--dark-card); color:var(--neon); padding:12px; border-radius:10px; text-decoration:none; text-align:center; margin-top:10px; font-weight:bold;">START NAVIGATION</a>
                        `;
                        container.appendChild(item);
                    });
                }
            } catch(e){}
        }

        function logout() { location.reload(); }
        setInterval(syncRiderAvailability, 3000);
        setInterval(checkRequests, 3000);
    </script>
</body>
</html>
